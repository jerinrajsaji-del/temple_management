{% extends 'base.html' %}
{% load static %}

{% block title %}Register - Divine Seva{% endblock %}

{% block content %}
<div class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-lg p-4 p-md-5">
                <div class="text-center mb-5">
                    <h2 class="fw-bold text-primary">JOIN DIVINE SEVA</h2>
                    <p class="text-muted">Create an account to track your rituals.</p>
                </div>
                
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-uppercase opacity-75">Preferred Username</label>
                        <input type="text" name="username" class="form-control form-control-lg bg-light border-0" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-uppercase opacity-75">Choose Password</label>
                        <input type="password" name="password" class="form-control form-control-lg bg-light border-0" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 py-3 shadow mb-4">Create Account</button>
                    
                    <div class="text-center">
                        <p class="text-muted small">Already have an account? <a href="/login" class="text-primary fw-bold text-decoration-none">Sign In</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
